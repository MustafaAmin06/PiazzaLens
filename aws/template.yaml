AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PiazzaLens - AI Insights for Piazza Backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
        DYNAMODB_TABLE_PREFIX: piazzalens

  Api:
    Cors:
      AllowMethods: "'POST, OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:
  # ---- API Gateway ----
  PiazzaLensApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # ---- Lambda Functions ----
  ClusterQuestionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: cluster_questions.handler
      CodeUri: lambda_functions/
      Policies:
        - AmazonBedrockFullAccess
        - AmazonDynamoDBReadOnlyAccess
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PiazzaLensApi
            Path: /cluster-questions
            Method: POST

  DetectConfusionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: detect_confusion.handler
      CodeUri: lambda_functions/
      Policies:
        - AmazonBedrockFullAccess
        - AmazonDynamoDBReadOnlyAccess
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PiazzaLensApi
            Path: /detect-confusion
            Method: POST

  GenerateEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: generate_email.handler
      CodeUri: lambda_functions/
      Policies:
        - AmazonBedrockFullAccess
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PiazzaLensApi
            Path: /generate-email
            Method: POST

  CourseHealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: course_health.handler
      CodeUri: lambda_functions/
      Policies:
        - AmazonDynamoDBReadOnlyAccess
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PiazzaLensApi
            Path: /course-health
            Method: POST

  SemanticSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: semantic_search.handler
      CodeUri: lambda_functions/
      Policies:
        - AmazonBedrockFullAccess
        - AmazonDynamoDBReadOnlyAccess
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref PiazzaLensApi
            Path: /semantic-search
            Method: POST

  # ---- DynamoDB Tables ----
  QuestionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: piazzalens-questions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: courseId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: course-index
          KeySchema:
            - AttributeName: courseId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  StudentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: piazzalens-students
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: courseId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: course-index
          KeySchema:
            - AttributeName: courseId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  CourseMetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: piazzalens-course-metrics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: courseId
          AttributeType: S
      KeySchema:
        - AttributeName: courseId
          KeyType: HASH

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${PiazzaLensApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
